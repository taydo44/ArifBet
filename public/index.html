<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArifBet — Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --gold: #d4a017;
        --gold-light: #f0c040;
        --gold-dark: #a07810;
        --bg-dark: #0a0a0f;
        --bg-card: #12121a;
        --bg-panel: #1a1a26;
      }
      * {
        box-sizing: border-box;
      }
      body {
        background-color: var(--bg-dark);
        background-image: radial-gradient(
            ellipse at 20% 20%,
            rgba(212, 160, 23, 0.08) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 80% 80%,
            rgba(212, 160, 23, 0.05) 0%,
            transparent 50%
          );
        min-height: 100vh;
        font-family: "Georgia", serif;
        color: #fff;
      }
      .gold {
        color: var(--gold);
      }
      .gold-bg {
        background-color: var(--gold);
      }
      .gold-border {
        border-color: var(--gold);
      }

      /* Card grid cells */
      .card-default {
        background: linear-gradient(135deg, #1e1e2e, #2a2a3e);
        border: 1px solid rgba(212, 160, 23, 0.2);
        color: #ccc;
        transition: all 0.2s ease;
      }
      .card-default:hover {
        border-color: var(--gold);
        color: var(--gold);
        box-shadow: 0 0 8px rgba(212, 160, 23, 0.4);
        cursor: pointer;
      }
      .card-mine {
        background: linear-gradient(135deg, #d4a017, #a07810) !important;
        color: #000 !important;
        font-weight: bold;
        box-shadow: 0 0 12px rgba(212, 160, 23, 0.6);
      }
      .card-taken {
        background: linear-gradient(135deg, #2a2a2a, #1a1a1a) !important;
        color: #444 !important;
        opacity: 0.5;
        pointer-events: none;
      }

      /* BINGO card preview */
      .bingo-header-cell {
        background: linear-gradient(135deg, var(--gold), var(--gold-dark));
        color: #000;
        font-weight: bold;
      }
      .bingo-number-cell {
        background: linear-gradient(135deg, #1e1e2e, #2a2a3e);
        border: 1px solid rgba(212, 160, 23, 0.3);
        color: #fff;
      }
      .bingo-free-cell {
        background: linear-gradient(135deg, var(--gold-dark), #8a6800);
        color: var(--gold-light);
        font-weight: bold;
      }

      /* Balance box */
      .balance-box {
        background: linear-gradient(
          135deg,
          rgba(212, 160, 23, 0.15),
          rgba(212, 160, 23, 0.05)
        );
        border: 1px solid rgba(212, 160, 23, 0.4);
      }

      /* Status bar */
      .status-bar {
        background: linear-gradient(
          90deg,
          rgba(212, 160, 23, 0.1),
          rgba(212, 160, 23, 0.05)
        );
        border-bottom: 1px solid rgba(212, 160, 23, 0.2);
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-dark);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--gold-dark);
        border-radius: 2px;
      }

      /* Shake animation */
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-6px);
        }
        40% {
          transform: translateX(6px);
        }
        60% {
          transform: translateX(-4px);
        }
        80% {
          transform: translateX(4px);
        }
      }
      .shake {
        animation: shake 0.4s ease;
      }

      /* Pulse for active game */
      @keyframes pulse-gold {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(212, 160, 23, 0.4);
        }
        50% {
          box-shadow: 0 0 0 6px rgba(212, 160, 23, 0);
        }
      }
      .pulse-gold {
        animation: pulse-gold 2s infinite;
      }
    </style>
  </head>

    <!-- Header -->
    <div class="status-bar px-4 py-2 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-xl font-bold gold">🎰 ArifBet</span>
        <span class="text-xs text-gray-500">Bingo</span>
      </div>
      <div
        id="balance-div"
        class="balance-box rounded-lg px-3 py-1 flex items-center gap-2"

      </div>
    </div>

        <div class="flex items-center gap-1">

        </div>
      </div>
    </div>

          style="grid-template-columns: repeat(10, minmax(0, 1fr))"

      </div>

      <!-- Instruction -->
      <div class="text-center text-xs text-gray-600 pt-2">
        Tap a card to preview · Tap again to select · Br. 10 per game
      </div>
    </div>

          document.getElementById(
            "status"
          ).textContent = `⏱ Game starting in ${data.timeLeft}s`;
        } else if (data.type === "gameStarted") {
          const obj = data.users;
          const players = data.players;
          if (username in obj) {
            const number = obj[username];
            fetch(`/decreasePlayerBalance?userID=${username}`)
              .then((r) => r.json())
              .then((d) => {
                if (d.proceed) {
                  const q = `?username=${encodeURIComponent(
                    username
                  )}&number=${encodeURIComponent(
                    number
                  )}&players=${encodeURIComponent(players)}`;
                  window.location.href = "/game.html" + q;
                }
              })
              .catch(console.error);
          } else {
            document.querySelector(".active-games").textContent = 1;
          }
        } else if (data.type === "removeGameStartedModal") {
          document.querySelector(".active-games").textContent = 0;
        } else if (data.type === "lowBalance") {
          if (username === data.u) shakeBox();
        }
      });

      function createBingoCard(c, n) {
        const html = `
        <div class="relative mb-3" style="width:100%;">
          <button class="clear-preview absolute top-0 right-0 w-6 h-6 rounded-full bg-gray-700 text-white text-xs flex items-center justify-center">&times;</button>
          <div class="text-center text-xs gold font-bold mb-1">Card #${n}</div>
          <div class="grid grid-cols-5 gap-1">
            ${["B", "I", "N", "G", "O"]
              .map(
                (l) =>
                  `<div class="bingo-header-cell h-6 flex items-center justify-center rounded text-xs">${l}</div>`
              )
              .join("")}
            ${[
              "b1",
              "i1",
              "n1",
              "g1",
              "o1",
              "b2",
              "i2",
              "n2",
              "g2",
              "o2",
              "b3",
              "i3",
              "FREE",
              "g3",
              "o3",
              "b4",
              "i4",
              "n4",
              "g4",
              "o4",
              "b5",
              "i5",
              "n5",
              "g5",
              "o5",
            ]
              .map((k, i) => {
                if (k === "FREE")
                  return `<div class="bingo-free-cell h-6 flex items-center justify-center rounded text-xs">⭐</div>`;
                return `<div class="bingo-number-cell h-6 flex items-center justify-center rounded text-xs card-numbers">${
                  c[k] || ""
                }</div>`;
              })
              .join("")}
          </div>
        </div>`;
        document.querySelector(".card-preview").innerHTML = html;
        document
          .querySelector(".clear-preview")
          .addEventListener("click", () => {
            document.querySelector(".card-preview").innerHTML = "";
          });
      }

      function shakeBox() {
        const box = document.getElementById("balance-div");
        box.classList.remove("shake");
        void box.offsetWidth;
        box.style.borderColor = "#ef4444";
        box.classList.add("shake");
        setTimeout(() => {
          box.style.borderColor = "rgba(212,160,23,0.4)";
        }, 500);
      }
    </script>
  </body>
</html>
