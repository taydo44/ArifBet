<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArifBet — Live Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --gold: #d4a017;
        --gold-light: #f0c040;
        --gold-dark: #a07810;
        --bg-dark: #0a0a0f;
        --bg-card: #12121a;
        --bg-panel: #1a1a26;
      }
      * {
        box-sizing: border-box;
      }
      body {
        background-color: var(--bg-dark);
        background-image: radial-gradient(
            ellipse at 20% 20%,
            rgba(212, 160, 23, 0.08) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 80% 80%,
            rgba(212, 160, 23, 0.05) 0%,
            transparent 50%
          );
        min-height: 100vh;
        font-family: "Georgia", serif;
        color: #fff;
      }

      /* Number board */
      .num-default {
        background: linear-gradient(135deg, #1e1e2e, #2a2a3e);
        border: 1px solid rgba(212, 160, 23, 0.1);
        color: #555;
      }
      .num-drawn {
        background: linear-gradient(135deg, #d4a017, #a07810) !important;
        color: #000 !important;
        font-weight: bold;
        box-shadow: 0 0 6px rgba(212, 160, 23, 0.5);
      }

      /* Bingo card numbers */
      .cn-default {
        background: linear-gradient(135deg, #1e1e2e, #2a2a3e);
        border: 1px solid rgba(212, 160, 23, 0.2);
        color: #aaa;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      .cn-marked {
        background: linear-gradient(135deg, #d4a017, #a07810) !important;
        color: #000 !important;
        font-weight: bold;
        border-color: var(--gold-light) !important;
      }
      .cn-free {
        background: linear-gradient(135deg, #a07810, #6a5000);
        color: var(--gold-light);
        font-weight: bold;
      }
      .cn-header {
        background: linear-gradient(135deg, var(--gold), var(--gold-dark));
        color: #000;
        font-weight: bold;
      }

      /* Current number display */
      .current-num-display {
        background: linear-gradient(
          135deg,
          rgba(212, 160, 23, 0.2),
          rgba(212, 160, 23, 0.05)
        );
        border: 2px solid var(--gold);
        box-shadow: 0 0 20px rgba(212, 160, 23, 0.3);
      }

      /* Bingo button */
      .bingo-btn {
        background: linear-gradient(135deg, var(--gold), var(--gold-dark));
        color: #000;
        font-weight: bold;
        letter-spacing: 0.1em;
        box-shadow: 0 0 15px rgba(212, 160, 23, 0.4);
        transition: all 0.2s ease;
      }
      .bingo-btn:hover {
        background: linear-gradient(135deg, var(--gold-light), var(--gold));
        box-shadow: 0 0 25px rgba(212, 160, 23, 0.7);
        transform: scale(1.02);
      }
      .bingo-btn:active {
        transform: scale(0.98);
      }

      /* Win modal */
      .win-modal {
        background: linear-gradient(
          135deg,
          rgba(10, 10, 15, 0.97),
          rgba(18, 18, 26, 0.97)
        );
        border: 2px solid var(--gold);
        box-shadow: 0 0 40px rgba(212, 160, 23, 0.4);
      }

      /* Last numbers strip */
      .last-num {
        background: rgba(212, 160, 23, 0.1);
        border: 1px solid rgba(212, 160, 23, 0.2);
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 3px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-dark);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--gold-dark);
        border-radius: 2px;
      }

      /* Pulse on current number */
      @keyframes pulse-gold {
        0%,
        100% {
          box-shadow: 0 0 20px rgba(212, 160, 23, 0.3);
        }
        50% {
          box-shadow: 0 0 35px rgba(212, 160, 23, 0.7);
        }
      }
      .pulse-current {
        animation: pulse-gold 1.5s infinite;
      }

      /* Win confetti effect */
      @keyframes confetti-fall {
        0% {
          transform: translateY(-10px) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(100px) rotate(360deg);
          opacity: 0;
        }
      }
    </style>
  </head>

    <!-- Header -->
    <div
      class="px-4 py-2 flex items-center justify-between border-b border-yellow-900/30"

      <span class="text-lg font-bold" style="color: var(--gold)"

      >

      </div>

            style="color: var(--gold)"
          >
            -
          </div>
          <div class="text-3xl font-bold current-number">-</div>
        </div>

        <!-- Last 3 numbers -->
        <div class="flex-1 flex gap-1 justify-end">
          <div
            class="last-num rounded-lg px-2 py-1 text-center"
            style="min-width: 36px"
          >
            <div class="text-xs text-gray-600 last-number-1-letter">-</div>
            <div class="text-sm font-bold text-gray-400 last-number-1">-</div>
          </div>
          <div
            class="last-num rounded-lg px-2 py-1 text-center"
            style="min-width: 36px"
          >
            <div class="text-xs text-gray-600 last-number-2-letter">-</div>
            <div class="text-sm font-bold text-gray-400 last-number-2">-</div>
          </div>
          <div
            class="last-num rounded-lg px-2 py-1 text-center"
            style="min-width: 36px"
          >
            <div class="text-xs text-gray-600 last-number-3-letter">-</div>
            <div class="text-sm font-bold text-gray-400 last-number-3">-</div>
          </div>
        </div>
      </div>

      <!-- Number board (5 rows × 15 cols) -->
      <div id="gridContainer" class="flex flex-col gap-[3px]"></div>

      <!-- Bingo card -->
      <div>
        <div class="text-xs text-gray-600 mb-1 uppercase tracking-wider">
          Your Card
        </div>
        <div class="bingo-card-numbers"></div>
      </div>
    </div>

    <!-- Bingo button (fixed bottom) -->
    <div
      class="fixed bottom-0 left-0 right-0 p-3"
      style="
        max-width: 480px;
        margin: 0 auto;
        background: linear-gradient(to top, var(--bg-dark), transparent);
      "
    >
      <div class="flex gap-2">
        <button
          class="bingo-btn flex-1 py-3 rounded-xl text-lg uppercase tracking-widest"
        >
          🎯 BINGO
        </button>
        <button
          class="refresh-button px-4 py-3 rounded-xl bg-gray-800 text-gray-400 text-sm border border-gray-700"
        >
          ↻
        </button>
      </div>
    </div>

    <!-- Win Modal -->
    <div
      id="winModal"
      class="hidden fixed inset-0 z-50 flex items-center justify-center px-4"
      style="background: rgba(0, 0, 0, 0.85)"
    >
      <div class="win-modal rounded-2xl p-6 w-full" style="max-width: 340px">
        <div class="text-center mb-4">
          <div class="text-4xl mb-2">🏆</div>
          <div class="username text-lg font-bold" style="color: var(--gold)">
            -
          </div>
        </div>
        <div class="winner-card mb-4"></div>
        <button
          onclick="toggleModal(false)"
          class="w-full py-2 rounded-xl text-sm text-gray-400 border border-gray-700"
        >
          Close
        </button>
      </div>
    </div>

        document.querySelector(".win").textContent = `Br. ${Math.floor(
          players * 0.8 * 10

        },
      ];

      function letterReturn(n) {
        if (n >= 1 && n <= 15) return "B";
        if (n >= 16 && n <= 30) return "I";
        if (n >= 31 && n <= 45) return "N";
        if (n >= 46 && n <= 60) return "G";
        if (n >= 61 && n <= 75) return "O";
        return "";
      }

      function toggleModal(show) {
        document.getElementById("winModal").classList.toggle("hidden", !show);
      }

      function createBingoCard(c, n) {
        const keys = [
          "b1",
          "i1",
          "n1",
          "g1",
          "o1",
          "b2",
          "i2",
          "n2",
          "g2",
          "o2",
          "b3",
          "i3",
          "FREE",
          "g3",
          "o3",
          "b4",
          "i4",
          "n4",
          "g4",
          "o4",
          "b5",
          "i5",
          "n5",
          "g5",
          "o5",
        ];
        let html = `<div class="text-xs font-bold mb-1" style="color:var(--gold)">Card #${n}</div>`;
        html += `<div class="grid grid-cols-5 gap-1">`;
        ["B", "I", "N", "G", "O"].forEach((l) => {
          html += `<div class="cn-header h-6 flex items-center justify-center rounded text-xs">${l}</div>`;
        });
        keys.forEach((k) => {
          if (k === "FREE") {
            html += `<div class="cn-free h-6 flex items-center justify-center rounded text-xs">⭐</div>`;
          } else {
            html += `<div class="cn-default h-6 flex items-center justify-center rounded text-xs card-numbers" data-val="${
              c[k] || ""
            }">${c[k] || ""}</div>`;
          }
        });
        html += `</div>`;
        document.querySelector(".bingo-card-numbers").innerHTML = html;

        document.querySelectorAll(".card-numbers").forEach((cell) => {
          cell.addEventListener("click", () => {
            cell.classList.toggle("cn-marked");
            cell.classList.toggle("cn-default");
          });
        });
      }

      createBingoCard(cards[number - 1], number);

      socket.addEventListener("message", (event) => {
        const data = JSON.parse(event.data);

        if (data.type === "numbersCalling") {
          const { current, count } = data;
          drawnNumbers.push(current);

          document
            .querySelector(`.number-${current}`)
            .classList.remove("num-default");
          document
            .querySelector(`.number-${current}`)
            .classList.add("num-drawn");

          document.querySelector(".current-number").textContent = current;
          document.querySelector(".current-number-letter").textContent =
            letterReturn(current);
          document.querySelector(".counter").textContent = count + "/75";

          const ln = drawnNumbers;
          document.querySelector(".last-number-3").textContent =
            ln[ln.length - 2] || "-";
          document.querySelector(".last-number-3-letter").textContent =
            letterReturn(ln[ln.length - 2]);
          document.querySelector(".last-number-2").textContent =
            ln[ln.length - 3] || "-";
          document.querySelector(".last-number-2-letter").textContent =
            letterReturn(ln[ln.length - 3]);
          document.querySelector(".last-number-1").textContent =
            ln[ln.length - 4] || "-";
          document.querySelector(".last-number-1-letter").textContent =
            letterReturn(ln[ln.length - 4]);
        } else if (data.type === "bingo") {
          document.querySelector(".winner-card").innerHTML = data.html;
          fetch(
            `/getWinneerDetails?userID=${data.u}&balance=${Math.floor(
              players * 10 * 0.8
            )}&isThisWinner=${username === data.u}`
          )
            .then((r) => r.json())
            .then((d) => {
              toggleModal(true);
              document.querySelector(".username").textContent =
                (username === data.u
                  ? "You"
                  : (d[0] && d[0].username) || "Someone") + " won! 🏆";
            })
            .catch(console.error);
        } else if (data.type === "gameFinished") {
          window.location.href = "/index.html";
        } else if (data.type === "blockUser") {
          if (username === data.u) window.location.href = "/index.html";
        } else if (data.type === "gettingDrawnNumbers") {
          drawnNumbers = data.drawnNumbers || [];
          drawnNumbers.forEach((n) => {
            const el = document.querySelector(`.number-${n}`);
            if (el) {
              el.classList.remove("num-default");
              el.classList.add("num-drawn");
            }
          });
          if (drawnNumbers.length > 0) {
            const last = drawnNumbers[drawnNumbers.length - 1];
            document.querySelector(".current-number").textContent = last;
            document.querySelector(".current-number-letter").textContent =
              letterReturn(last);
            document.querySelector(".counter").textContent =
              drawnNumbers.length + "/75";
          }
        }
      });

      document.querySelector(".bingo-button") &&
        document
          .querySelector(".bingo-button")
          .addEventListener("click", () => {
            socket.send(
              JSON.stringify({
                type: "bingo",
                c: cards[number - 1],
                username,
                n: number,
              })
            );
          });

      document.querySelector(".bingo-btn").addEventListener("click", () => {
        socket.send(
          JSON.stringify({
            type: "bingo",
            c: cards[number - 1],
            username,
            n: number,
          })
        );
      });

      document
        .querySelector(".refresh-button")
        .addEventListener("click", () => {
          socket.send(JSON.stringify({ type: "refreshGameState" }));
        });
    </script>
